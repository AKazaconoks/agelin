# CI for agelin itself: typecheck, unit tests, smoke-run the CLI
# against fixtures (which intentionally contain bad subagents — non-zero
# exit is expected and tolerated). Also typechecks the VS Code extension
# under editor/vscode/ so an agelin API change that would break the
# extension surfaces here, not after marketplace publish.

name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Typecheck and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'package-lock.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx bun test

      - name: CLI smoke (allowed to fail — fixtures contain bad subagents)
        continue-on-error: true
        run: npx tsx src/cli.ts check ./fixtures/subagents/

      # The VS Code extension lives in its own sub-project with its own
      # package.json + node_modules. Install + typecheck here so a
      # breaking change in agelin's public API can't slip past CI.
      - name: VS Code extension — install
        working-directory: editor/vscode
        run: npm install --no-audit --no-fund

      - name: VS Code extension — typecheck
        working-directory: editor/vscode
        run: npx tsc -p . --noEmit

      - name: VS Code extension — bundle (smoke)
        working-directory: editor/vscode
        run: npm run build
